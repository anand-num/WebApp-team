<head>

    <link rel="stylesheet" href="/public/css/styles.css">

<body>
    <header class="nav-header">
        <div class="left-nav">
            <a href="" class="logo-btn">
                <img src="/public/source/shirt.svg" alt="" class="logo-icon">
                <p>RentFit</p>
            </a>
        </div>
        <div class="middle-nav">
            <a href="">Нүүр</a>
            <a href="">Үзэх</a>
            <a href="">Миний түрээс</a>
        </div>
        <div class="right-nav">
            <a href="" class="like-btn">
                <img src="/public/source/love.svg" alt="">
            </a>
            <a href="" class="primary-btn">ЗАР НЭМЭХ</a>
            <a href="" class="profile-btn">
                <img src="/public/source/profile.svg" alt="" class="profile-btn">
            </a>
        </div>
    </header>
<!-- SIDE FILTER SECTION -->
    <aside class="flt-sb">
        <legend class="flt-ttl">Ангилал</legend>
        <fieldset class="cat-chips">
            <label class="flt-row">
                <input type="checkbox" value="dress" onchange="togCat('dress')">
                Гоёлын
                хувцас</label>
            <label class="flt-row">
                <input type="checkbox" value="business" onchange="togCat('business')">
                Бизнес</label>
            <label class="flt-row">
                <input type="checkbox" value="traditional" onchange="togCat('traditional')"> Монгол дэл</label>
            <label class="flt-row">
                <input type="checkbox" value="casual" onchange="togCat('casual')"> Өдөр тутмын</label>
        </fieldset>
        <legend class="flt-ttl">Размер</legend>
        <fieldset class="sz-chips">
            <label>
                <input type="checkbox" name="size" value="XS"> XS
            </label>

            <label>
                <input type="checkbox" name="size" value="S"> S
            </label>

            <label>
                <input type="checkbox" name="size" value="M"> M
            </label>

            <label>
                <input type="checkbox" name="size" value="L"> L
            </label>

            <label>
                <input type="checkbox" name="size" value="XL"> XL
            </label>

            <label>
                <input type="checkbox" name="size" value="XXL"> XXL
            </label>
        </fieldset>
        <legend class="flt-ttl">Үнэ (₮/өдөр)</legend>
        <div class="pr-inputs">
            <input class="inp" style="font-size:.78rem" type="number" placeholder="Min" value=""
                oninput="S.flt.pMin=this.value;applyFlt()">
            <input class="inp" style="font-size:.78rem" type="number" placeholder="Max" value=""
                oninput="S.flt.pMax=this.value;applyFlt()">
        </div>
        <button class="flt-reset" onclick="resetFlt()">Шүүлт цэвэрлэх</button>
    </aside>

<!-- MAIN BROWSE SECTION -->
    <main class="cat-main">
        <search class="cat-bar">
            <form>
                <input class="sw">
                <span class="si">🔍</span>
                <input class="inp" id="srchInp" placeholder="Хувцас хайх..."
                    oninput="applyFlt()">
                <button class="btn btn-dark btn-sm mob-flt" onclick="openFltDw()">⚙ Шүүлт</button>
                <select class="inp" style="width:auto;min-width:150px" id="sortSel" onchange="applyFlt()">
                    <option value="">Эрэмбэлэх</option>
                    <option value="price-asc">Үнэ ↑</option>
                    <option value="price-desc">Үнэ ↓</option>
                    <option value="rating">Рейтинг ↓</option>
                    <option value="new">Шинэ эхэнд</option>
                </select>
                <span class="cat-info" id="catInfo">16 хувцас</span>
            </form>
        </search>
        <section class="pg" id="catGrid">
            <article class="pc" onclick="go('product',1)">
                    <img src="public/source/mongol-deel.png"
                        alt="Хар гоёлын хантааз">
                    <span class="badge b-gold">Хит</span>
                <!-- ene havid like button baina -->

                    <h2 class="pc-brand">Zara</h2>
                    <h1 class="pc-name">Хар гоёлын хантааз</h1>
                    <span class="pc-meta">Одоо 5 хүний сагсанд байна</span>
                    <footer class="pc-ft">
                        <dl class="pc-price-group">
                            <dt class="sr-only">Үнэ</dt>
                            <dd>
                            <span class="pc-from">өдрөөс</span>
                            <data class="pc-price" value="15000">15,000₮</data>
                            </dd>
                        </dl>

                        <dl class="pc-rating-group">
                            <dt class="sr-only">Үнэлгээ</dt>
                            <dd>
                            <div class="pc-stars" aria-hidden="true">★★★★★</div>
                            <div class="pc-meta">
                                <data value="4.8">4.8</data> 
                                <span class="pc-reviews">(42)</span>
                            </div>
                            </dd>
                        </dl>
                    </footer>
                    <hr>
                    <h3 class="pc-av">Нарантуяа</h3>
                </summary>
            </article>
