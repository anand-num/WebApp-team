<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentFit — Admin</title>
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══ STATE ═══ */
const DB = {
  adminLoggedIn: false,
  products: [],
  productsLoaded: false,
  orders: [],
  users: [
    { id:1, name:'Нарантуяа Батболд', email:'nara@example.com', phone:'9911-0001', orders:3 },
    { id:2, name:'Анхбаяр Дорж',      email:'ankhbayar@mail.mn', phone:'9922-3344', orders:1 },
    { id:3, name:'Солонго Мөнх',      email:'solongo@gmail.com', phone:'9955-6677', orders:5 },
  ],
  search: '',
  filter: 'all',
};

/* ═══ UTILS ═══ */
const $ = id => document.getElementById(id);
const SIZES = ['XS','S','M','L','XL','XXL'];
const CATS = [
  { v:'all',         l:'Бүгд' },
  { v:'dress',       l:'Гоёлын' },
  { v:'traditional', l:'Монгол дэл' },
  { v:'costume',     l:'Костюм' },
  { v:'business',    l:'Бизнес' },
  { v:'casual',      l:'Өдөр тутмын' },
];

let toastT;
function toast(msg, type='') {
  const el = $('toast');
  el.innerHTML = (type === 'green' ? '✓ ' : type === 'red' ? '✕ ' : '') + msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastT);
  toastT = setTimeout(() => el.className = 'toast', 3000);
}
function nav(p) { window.location.hash = p; }
function stars(r) {
  const full = Math.floor(r), half = r % 1 >= .5;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half?1:0));
}
function imgSrc(src) { return '../json/' + src; }

/* ═══ LOAD PRODUCTS FROM JSON ═══ */
async function loadProducts() {
  if (DB.productsLoaded) return;
  try {
    const res = await fetch('../json/product.json');
    if (!res.ok) throw new Error('fetch failed');
    const raw = await res.json();
    DB.products = raw.map((p, i) => ({
      id: i + 1,
      brand: p.brand.replace(/_/g, ' '),
      name: p.item_name.replace(/_/g, ' '),
      publisher: p.publisher,
      rating: p.rating,
      reviews: p.review_count,
      price: p.price,
      pricePeriod: p.price_period,
      status: p.status.toLowerCase(),
      img: p.img_src,
      category: guessCategory(p.item_name, p.brand),
      sizes: ['S','M','L'],
      approved: true,
    }));
    DB.productsLoaded = true;
  } catch(e) {
    console.warn('Could not load product.json:', e.message);
    DB.productsLoaded = true;
  }
}

function guessCategory(name, brand) {
  const n = (name + ' ' + brand).toLowerCase();
  if (/deel|mongol|queen|olimpic|male_cost/.test(n)) return 'traditional';
  if (/dress|gown|ballroom|tango|wedding|kimono|violet|evergarden|anna|blue/.test(n)) return 'dress';
  if (/costume|bear|disney/.test(n)) return 'costume';
  return 'dress';
}

/* ═══ ROUTER ═══ */
window.addEventListener('hashchange', render);
window.addEventListener('load', render);

async function render() {
  const hash = (window.location.hash.slice(1) || 'login');
  const [page, ...params] = hash.split('/');
  if (page === 'login' || page === '') { renderLogin(); return; }
  if (page === 'admin') {
    await loadProducts();
    renderAdmin(params[0] || 'dashboard', params[1]);
    return;
  }
  renderLogin();
}

/* ═══ LOGIN PAGE ═══ */
function renderLogin() {
  $('app').innerHTML = `
  <div class="login-page page">
    <div class="login-bg"></div>
    <div class="login-grid"></div>
    <div class="login-card">
      <div class="login-logo">Rent<em>Fit</em></div>
      <div class="login-sub">ADMIN PANEL • УДИРДЛАГЫН САМБАР</div>
      <div id="loginErr"></div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Хэрэглэгчийн нэр</label>
        <input id="a_user" value="admin" autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Нууц үг</label>
        <input type="password" id="a_pass" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="current-password">
      </div>
      <button class="btn btn-gold" style="width:100%;justify-content:center;padding:13px" onclick="doLogin()">
        Нэвтрэх →
      </button>
      <div class="login-hint"><strong>Туршилт:</strong> admin / rentfit2025</div>
    </div>
  </div>`;
  setTimeout(() => { const p = $('a_pass'); if(p) p.focus(); }, 50);
}
function doLogin() {
  if ($('a_user').value === 'admin' && $('a_pass').value === 'rentfit2025') {
    DB.adminLoggedIn = true;
    nav('admin/dashboard');
  } else {
    $('loginErr').innerHTML = '<div class="error-msg">Буруу нэр эсвэл нууц үг</div>';
  }
}

/* ═══ ADMIN SHELL ═══ */
function renderAdmin(sub, param) {
  if (!DB.adminLoggedIn) { nav('login'); return; }
  const pending = DB.products.filter(p => p.status === 'pending').length;
  const sidebar = `
  <div class="admin-side">
    <div class="side-logo">
      <div class="wordmark">Rent<em>Fit</em></div>
      <div class="tagline">Admin Panel</div>
    </div>
    <div class="side-section">
      <div class="side-section-label">Үндсэн</div>
      <nav class="side-nav">
        <a onclick="nav('admin/dashboard')" class="${sub==='dashboard'?'active':''}">
          <span class="ico">◈</span> Dashboard
        </a>
        <a onclick="nav('admin/products')" class="${['products','add','edit'].includes(sub)?'active':''}">
          <span class="ico">◉</span> Бүтээгдэхүүн
          ${pending ? `<span class="badge">${pending}</span>` : ''}
        </a>
        <a onclick="nav('admin/orders')" class="${sub==='orders'?'active':''}">
          <span class="ico">◌</span> Захиалга
        </a>
        <a onclick="nav('admin/users')" class="${sub==='users'?'active':''}">
          <span class="ico">◎</span> Хэрэглэгч
        </a>
      </nav>
    </div>
    <div class="side-footer">
      <nav class="side-nav">
        <a onclick="DB.adminLoggedIn=false;nav('login');toast('Амжилттай гарлаа')">
          <span class="ico">⊣</span> Гарах
        </a>
      </nav>
    </div>
  </div>`;

  let content = '';
  if (sub === 'dashboard') content = pageDashboard();
  else if (sub === 'products') content = pageProducts();
  else if (sub === 'add') content = pageAdd();
  else if (sub === 'edit') content = pageEdit(param);
  else if (sub === 'orders') content = pageOrders();
  else if (sub === 'users') content = pageUsers();
  else content = pageDashboard();

  $('app').innerHTML = `<div class="page"><div class="admin-layout">${sidebar}<div class="admin-content">${content}</div></div></div>`;
}

/* ═══ DASHBOARD ═══ */
function pageDashboard() {
  const total = DB.products.length;
  const active = DB.products.filter(p => p.status !== 'pending' && p.status !== 'rejected').length;
  const pending = DB.products.filter(p => p.status === 'pending').length;
  const premium = DB.products.filter(p => p.status === 'premium').length;
  const months = ['1-р','2-р','3-р','4-р','5-р','6-р','7-р'];
  const bars = [28, 45, 38, 62, 74, 55, 80];
  const maxBar = Math.max(...bars);

  const pendingRows = DB.products.filter(p => p.status === 'pending').slice(0,5);

  return `
  <div class="content-header">
    <div class="content-header-left">
      <div class="breadcrumb"><span>RentFit</span> / <span>Dashboard</span></div>
      <h1>Ерөнхий тойм</h1>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:.72rem;color:var(--muted)">${new Date().toLocaleDateString('mn-MN', {year:'numeric',month:'long',day:'numeric'})}</span>
    </div>
  </div>
  <div class="content-body">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">◉</div>
        <div class="label">Нийт бараа</div>
        <div class="value">${total}</div>
        <div class="delta">↑ ${active} идэвхтэй</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">◈</div>
        <div class="label">Хүлээгдэж буй</div>
        <div class="value gold">${pending}</div>
        <div class="delta warn">⏳ Баталгаажуулах шаардлагатай</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">◌</div>
        <div class="label">Захиалга</div>
        <div class="value">${DB.orders.length}</div>
        <div class="delta">${DB.orders.length ? '↑ Нийт' : '— Байхгүй'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">◎</div>
        <div class="label">Хэрэглэгч</div>
        <div class="value">${DB.users.length}</div>
        <div class="delta">↑ ${DB.users.length} бүртгэлтэй</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <h3>Сарын түрээсийн статистик</h3>
        <div class="chart-legend"><span>Түрээс</span></div>
      </div>
      <div class="chart-bars">
        ${bars.map((h, i) => `
          <div class="chart-bar-wrap">
            <div class="chart-bar" style="height:${(h/maxBar)*100}%">
              <div class="chart-bar-tooltip">${h}</div>
            </div>
            <span class="chart-bar-lbl">${months[i]}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="table-card">
      <div class="table-head">
        <h3>Хүлээгдэж буй бараанууд</h3>
        <button class="btn btn-ghost btn-sm" onclick="nav('admin/products')">Бүгдийг харах →</button>
      </div>
      <table class="data-table">
        <thead><tr>
          <th>Бараа</th><th>Ангилал</th><th>Үнэ</th><th>Үйлдэл</th>
        </tr></thead>
        <tbody>
          ${pendingRows.length ? pendingRows.map(p => `
            <tr>
              <td><div class="prod-cell">
                <img class="prod-thumb" src="${imgSrc(p.img)}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
                <div class="prod-thumb-placeholder" style="display:none">👗</div>
                <div><div class="prod-name">${p.name}</div><div class="prod-brand">${p.brand}</div></div>
              </div></td>
              <td>${CATS.find(c=>c.v===p.category)?.l || p.category}</td>
              <td><span class="price-cell">${p.price}</span></td>
              <td><div class="actions">
                <button class="btn btn-success btn-sm" onclick="approveP(${p.id})">✓ Зөвшөөрөх</button>
                <button class="btn btn-danger btn-sm" onclick="rejectP(${p.id})">✕</button>
              </div></td>
            </tr>`).join('') :
          `<tr><td colspan="4"><div class="empty-state"><span class="empty-icon">✓</span>Хүлээгдэж буй бараа байхгүй</div></td></tr>`}
        </tbody>
      </table>
    </div>
  </div>`;
}

/* ═══ PRODUCTS PAGE ═══ */
function pageProducts() {
  let filtered = [...DB.products];
  if (DB.search) {
    const q = DB.search.toLowerCase();
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.brand.toLowerCase().includes(q) ||
      p.publisher?.toLowerCase().includes(q)
    );
  }
  if (DB.filter !== 'all') filtered = filtered.filter(p => p.status === DB.filter);

  return `
  <div class="content-header">
    <div class="content-header-left">
      <div class="breadcrumb"><span>RentFit</span> / <span onclick="nav('admin/products')" style="cursor:pointer">Бүтээгдэхүүн</span></div>
      <h1>Бүтээгдэхүүн</h1>
    </div>
    <button class="btn btn-gold" onclick="nav('admin/add')">+ Нэмэх</button>
  </div>
  <div class="content-body">
    <div class="table-card">
      <div class="table-head">
        <h3>Бүх бараа <span style="font-size:.72rem;color:var(--muted);font-weight:400">(${filtered.length})</span></h3>
        <div class="table-toolbar">
          <div class="search-wrap">
            <input class="search-input" placeholder="Хайх..." value="${DB.search}"
              oninput="DB.search=this.value;renderAdmin('products')">
          </div>
          <select class="filter-select" onchange="DB.filter=this.value;renderAdmin('products')">
            <option value="all" ${DB.filter==='all'?'selected':''}>Бүгд</option>
            <option value="premium" ${DB.filter==='premium'?'selected':''}>Premium</option>
            <option value="standard" ${DB.filter==='standard'?'selected':''}>Standard</option>
            <option value="pending" ${DB.filter==='pending'?'selected':''}>Хүлээгдэж</option>
            <option value="rejected" ${DB.filter==='rejected'?'selected':''}>Татгалзсан</option>
          </select>
        </div>
      </div>
      <table class="data-table">
        <thead><tr>
          <th>Бараа</th>
          <th>Нийтэлсэн</th>
          <th>Рэйтинг</th>
          <th>Үнэ</th>
          <th>Статус</th>
          <th>Үйлдэл</th>
        </tr></thead>
        <tbody>
          ${filtered.length ? filtered.map(p => `
          <tr>
            <td><div class="prod-cell">
              <img class="prod-thumb" src="${imgSrc(p.img)}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
              <div class="prod-thumb-placeholder" style="display:none">👗</div>
              <div>
                <div class="prod-name">${p.name}</div>
                <div class="prod-brand">${p.brand}</div>
              </div>
            </div></td>
            <td style="color:rgba(255,255,255,.5)">${p.publisher || '—'}</td>
            <td>
              <div class="rating-row">
                <span class="stars">${'★'.repeat(Math.floor(p.rating))}</span>
                <span class="rating-num">${p.rating.toFixed(1)}</span>
                <span class="review-count">(${p.reviews})</span>
              </div>
            </td>
            <td>
              <div class="price-cell">${p.price}</div>
              <div class="price-period">${p.pricePeriod}</div>
            </td>
            <td><span class="badge ${p.status}">${p.status === 'premium' ? 'Premium' : p.status === 'standard' ? 'Standard' : p.status === 'pending' ? 'Хүлээгдэж' : 'Татгалзсан'}</span></td>
            <td><div class="actions">
              <button class="btn-icon" onclick="nav('admin/edit/${p.id}')" title="Засах">✏️</button>
              ${p.status === 'pending' ? `
                <button class="btn btn-success btn-sm" onclick="approveP(${p.id})">✓</button>
                <button class="btn btn-danger btn-sm" onclick="rejectP(${p.id})">✕</button>` : ''}
              <button class="btn-icon" onclick="deleteP(${p.id})" title="Устгах">🗑</button>
            </div></td>
          </tr>`).join('') :
          `<tr><td colspan="6"><div class="empty-state"><span class="empty-icon">🔍</span>Тохирох бараа олдсонгүй</div></td></tr>`}
        </tbody>
      </table>
    </div>
  </div>`;
}

/* ═══ ADD PRODUCT ═══ */
function pageAdd() {
  return `
  <div class="content-header">
    <div class="content-header-left">
      <div class="breadcrumb">
        <span onclick="nav('admin/products')" style="cursor:pointer">Бүтээгдэхүүн</span> / <span>Нэмэх</span>
      </div>
      <h1>Шинэ бараа нэмэх</h1>
    </div>
  </div>
  <div class="content-body">
    <div class="form-card">
      <div class="form-grid">
        <div class="form-group"><label>Брэнд *</label><input id="af_brand"></div>
        <div class="form-group"><label>Бараанлы нэр *</label><input id="af_name"></div>
        <div class="form-group full"><label>Тайлбар *</label><textarea id="af_desc"></textarea></div>
        <div class="form-group"><label>Ангилал *</label>
          <select id="af_cat"><option value="">— Сонгох —</option>
            ${CATS.filter(c=>c.v!=='all').map(c=>`<option value="${c.v}">${c.l}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Нийтэлсэн</label><input id="af_publisher"></div>
        <div class="form-group"><label>Үнэ (1 өдөр) *</label><input id="af_price" placeholder="45,000₮"></div>
        <div class="form-group"><label>Статус</label>
          <select id="af_status">
            <option value="standard">Standard</option>
            <option value="premium">Premium</option>
          </select>
        </div>
        <div class="form-group"><label>Зургийн нэр</label><input id="af_img" placeholder="filename.jpg"></div>
        <div class="form-group full"><label>Размер</label>
          <div class="size-checks">
            ${SIZES.map(s=>`<input type="checkbox" class="size-check" id="sz_${s}" value="${s}"><label class="size-label" for="sz_${s}">${s}</label>`).join('')}
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-gold" onclick="saveNew()">Хадгалах</button>
        <button class="btn btn-ghost" onclick="nav('admin/products')">Болих</button>
      </div>
    </div>
  </div>`;
}
function saveNew() {
  const brand=$('af_brand').value, name=$('af_name').value, desc=$('af_desc').value,
    cat=$('af_cat').value, pub=$('af_publisher').value, price=$('af_price').value,
    status=$('af_status').value, img=$('af_img').value;
  const sz = SIZES.filter(s => document.getElementById('sz_'+s)?.checked);
  if (!brand||!name||!cat||!price) { toast('Заавал талбаруудыг бөглөнө үү','red'); return; }
  DB.products.push({
    id: Math.max(0,...DB.products.map(p=>p.id)) + 1,
    brand, name, desc, category: cat,
    publisher: pub, price, pricePeriod: 'өдрөөс',
    status, img: img || '',
    sizes: sz.length ? sz : ['S','M','L'],
    rating: 0, reviews: 0,
  });
  toast('Амжилттай нэмэгдлээ ✓','green');
  nav('admin/products');
}

/* ═══ EDIT PRODUCT ═══ */
function pageEdit(id) {
  const p = DB.products.find(x => x.id == id);
  if (!p) return '<div class="content-body"><p style="color:var(--muted)">Бараа олдсонгүй</p></div>';
  return `
  <div class="content-header">
    <div class="content-header-left">
      <div class="breadcrumb">
        <span onclick="nav('admin/products')" style="cursor:pointer">Бүтээгдэхүүн</span> / <span>Засах</span>
      </div>
      <h1>${p.name}</h1>
    </div>
  </div>
  <div class="content-body">
    <div class="form-card">
      <div class="form-grid">
        <div class="form-group"><label>Брэнд</label><input id="ef_brand" value="${p.brand}"></div>
        <div class="form-group"><label>Нэр</label><input id="ef_name" value="${p.name}"></div>
        <div class="form-group full"><label>Тайлбар</label><textarea id="ef_desc">${p.desc||''}</textarea></div>
        <div class="form-group"><label>Ангилал</label>
          <select id="ef_cat">
            ${CATS.filter(c=>c.v!=='all').map(c=>`<option value="${c.v}" ${p.category===c.v?'selected':''}>${c.l}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Нийтэлсэн</label><input id="ef_publisher" value="${p.publisher||''}"></div>
        <div class="form-group"><label>Үнэ</label><input id="ef_price" value="${p.price}"></div>
        <div class="form-group"><label>Статус</label>
          <select id="ef_status">
            <option value="standard" ${p.status==='standard'?'selected':''}>Standard</option>
            <option value="premium"  ${p.status==='premium'?'selected':''}>Premium</option>
            <option value="pending"  ${p.status==='pending'?'selected':''}>Хүлээгдэж</option>
            <option value="rejected" ${p.status==='rejected'?'selected':''}>Татгалзсан</option>
          </select>
        </div>
        <div class="form-group"><label>Зургийн нэр</label><input id="ef_img" value="${p.img||''}"></div>
        <div class="form-group full"><label>Размер</label>
          <div class="size-checks">
            ${SIZES.map(s=>`<input type="checkbox" class="size-check" id="esz_${s}" value="${s}" ${(p.sizes||[]).includes(s)?'checked':''}><label class="size-label" for="esz_${s}">${s}</label>`).join('')}
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-gold" onclick="saveEdit(${p.id})">Хадгалах</button>
        <button class="btn btn-ghost" onclick="nav('admin/products')">Болих</button>
      </div>
    </div>
  </div>`;
}
function saveEdit(id) {
  const p = DB.products.find(x => x.id == id);
  p.brand = $('ef_brand').value;
  p.name = $('ef_name').value;
  p.desc = $('ef_desc').value;
  p.category = $('ef_cat').value;
  p.publisher = $('ef_publisher').value;
  p.price = $('ef_price').value;
  p.status = $('ef_status').value;
  p.img = $('ef_img').value;
  p.sizes = SIZES.filter(s => document.getElementById('esz_'+s)?.checked);
  toast('Хадгалагдлаа ✓','green');
  nav('admin/products');
}

/* ═══ ACTIONS ═══ */
function approveP(id) {
  const p = DB.products.find(x => x.id == id);
  if (p) { p.status = 'standard'; toast(`"${p.name}" зөвшөөрөгдлөө ✓`,'green'); }
  renderAdmin(window.location.hash.includes('dashboard') ? 'dashboard' : 'products');
}
function rejectP(id) {
  const p = DB.products.find(x => x.id == id);
  if (p) { p.status = 'rejected'; toast('Татгалзагдлаа','red'); }
  renderAdmin(window.location.hash.includes('dashboard') ? 'dashboard' : 'products');
}
function deleteP(id) {
  if (!confirm('Энэ барааг устгах уу?')) return;
  DB.products = DB.products.filter(x => x.id != id);
  toast('Устгагдлаа');
  renderAdmin('products');
}
