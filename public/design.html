<!DOCTYPE html>
<html lang="mn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentFit — Хувцас Түрээс</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
   DESIGN SYSTEM — REVOLVE-INSPIRED LUXURY
   ═══════════════════════════════════════════ */
    :root {
      --ink: #111;
      --cream: #faf8f5;
      --warm: #f0ece4;
      --paper: #fff;
      --gold: #b8963e;
      --gold2: #d4af5a;
      --gold-soft: rgba(184, 150, 62, .08);
      --gold-glow: rgba(184, 150, 62, .18);
      --muted: #8a8078;
      --muted2: #b0a89e;
      --border: #e8e4de;
      --border2: #d5d0c8;
      --red: #c0392b;
      --green: #2d8a56;
      --admin-bg: #0c0b09;
      --admin-panel: #161411;
      --admin-side: #121010;
      --r: 3px;
      --r2: 8px;
      --sans: 'Outfit', system-ui, sans-serif;
      --serif: 'Cormorant Garamond', 'Georgia', serif;
      --ease: cubic-bezier(.25, .46, .45, .94);
      --ease2: cubic-bezier(.4, 0, .2, 1);
      --shadow-xs: 0 1px 3px rgba(0, 0, 0, .04);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, .06);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, .08);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, .12);
      --shadow-xl: 0 32px 64px rgba(0, 0, 0, .16);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.6
    }

    a {
      text-decoration: none;
      color: inherit
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: none
    }

    input,
    select,
    textarea {
      font-family: inherit;
      outline: none
    }

    img {
      max-width: 100%;
      display: block
    }

    ::selection {
      background: var(--gold);
      color: white
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: var(--cream)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 10px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--gold)
    }

    /* ═══ REVOLVE-STYLE DUAL-ROW NAV ═══ */
    .nav-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      transition: transform .35s var(--ease2), box-shadow .3s
    }

    .nav-wrapper.scrolled {
      box-shadow: 0 2px 20px rgba(0, 0, 0, .06)
    }

    .nav-wrapper.hidden {
      transform: translateY(-100%)
    }

    /* Top bar */
    .nav-top {
      background: var(--ink);
      color: rgba(255, 255, 255, .7);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 32px;
      font-size: .68rem;
      letter-spacing: .8px;
      text-transform: uppercase
    }

    .nav-top-left {
      display: flex;
      gap: 20px
    }

    .nav-top-left span {
      opacity: .5
    }

    .nav-top-right {
      display: flex;
      align-items: center;
      gap: 16px
    }

    .nav-top-right a {
      cursor: pointer;
      transition: color .2s
    }

    .nav-top-right a:hover {
      color: var(--gold)
    }

    /* Main nav */
    .nav-main {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 58px
    }

    .nav-logo {
      font-family: var(--serif);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
      flex-shrink: 0
    }

    .nav-logo em {
      font-style: normal;
      color: var(--gold);
      font-weight: 400
    }

    .nav-icons {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .nav-icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all .2s var(--ease);
      position: relative;
      color: var(--ink);
      font-size: 1rem
    }

    .nav-icon-btn:hover {
      background: var(--gold-soft);
      color: var(--gold)
    }

    .nav-icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5
    }

    .nav-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--ink);
      color: white;
      font-size: .55rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--paper)
    }

    .nav-search-box {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      padding: 0 14px;
      height: 34px;
      gap: 6px;
      min-width: 180px;
      transition: border-color .2s
    }

    .nav-search-box:focus-within {
      border-color: var(--gold)
    }

    .nav-search-box input {
      border: none;
      font-size: .78rem;
      background: transparent;
      width: 100%;
      color: var(--ink)
    }

    .nav-search-box input::placeholder {
      color: var(--muted2)
    }

    .nav-search-box svg {
      width: 16px;
      height: 16px;
      stroke: var(--muted2);
      fill: none;
      stroke-width: 1.5;
      flex-shrink: 0
    }

    .nav-user-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: all .2s;
      cursor: pointer
    }

    .nav-user-btn:hover {
      color: var(--gold)
    }

    /* Category bar */
    .nav-cats {
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      height: 42px;
      padding: 0 48px
    }

    .nav-cat-link {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink);
      padding: 0 18px;
      height: 100%;
      display: flex;
      align-items: center;
      position: relative;
      cursor: pointer;
      transition: color .2s
    }

    .nav-cat-link:hover,
    .nav-cat-link.active {
      color: var(--gold)
    }

    .nav-cat-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 18px;
      right: 18px;
      height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform .25s var(--ease2)
    }

    .nav-cat-link:hover::after,
    .nav-cat-link.active::after {
      transform: scaleX(1)
    }

    /* Mega dropdown */
    .mega-drop {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      padding: 36px 48px;
      display: none;
      z-index: 190;
      animation: megaIn .25s var(--ease2)
    }

    .mega-drop.open {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1.2fr;
      gap: 32px
    }

    @keyframes megaIn {
      from {
        opacity: 0;
        transform: translateY(-6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .mega-col h4 {
      font-size: .68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink);
      font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border)
    }

    .mega-col a {
      display: block;
      font-size: .82rem;
      color: var(--muted);
      padding: 5px 0;
      cursor: pointer;
      transition: color .15s
    }

    .mega-col a:hover {
      color: var(--gold)
    }

    .mega-featured {
      position: relative;
      overflow: hidden;
      border-radius: var(--r2);
      aspect-ratio: 4/5;
      cursor: pointer
    }

    .mega-featured-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      transition: transform .5s
    }

    .mega-featured:hover .mega-featured-bg {
      transform: scale(1.04)
    }

    .mega-featured-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(transparent, rgba(0, 0, 0, .5));
      color: white
    }

    .mega-featured-info h5 {
      font-family: var(--serif);
      font-size: 1rem;
      margin-bottom: 2px
    }

    .mega-featured-info p {
      font-size: .72rem;
      opacity: .7
    }

    /* Profile dropdown */
    .prof-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 6px;
      min-width: 200px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: all .2s var(--ease2);
      z-index: 210
    }

    .prof-dropdown.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all
    }

    .prof-dropdown a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      font-size: .82rem;
      border-radius: var(--r);
      cursor: pointer;
      transition: all .15s
    }

    .prof-dropdown a:hover {
      background: var(--gold-soft);
      color: var(--gold)
    }

    .prof-dropdown hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0
    }

    /* Mobile nav */
    .mob-toggle {
      display: none;
      width: 40px;
      height: 40px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0
    }

    .mob-toggle span {
      width: 20px;
      height: 1.5px;
      background: var(--ink);
      transition: all .3s;
      display: block
    }

    .mob-toggle.open span:nth-child(1) {
      transform: rotate(45deg) translate(4px, 4px)
    }

    .mob-toggle.open span:nth-child(2) {
      opacity: 0
    }

    .mob-toggle.open span:nth-child(3) {
      transform: rotate(-45deg) translate(4px, -4px)
    }

    .mob-menu {
      position: fixed;
      inset: 0;
      top: 90px;
      background: var(--paper);
      z-index: 190;
      padding: 24px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform .35s var(--ease2)
    }

    .mob-menu.open {
      transform: translateX(0)
    }

    .mob-menu a {
      display: block;
      font-size: .88rem;
      font-weight: 500;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: color .15s
    }

    .mob-menu a:hover {
      color: var(--gold)
    }

    .mob-grid-toggle {
      display: none;
      gap: 4px
    }

    .mob-grid-toggle button {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      background: var(--paper);
      transition: all .2s
    }

    .mob-grid-toggle button.active {
      background: var(--ink);
      color: white;
      border-color: var(--ink)
    }

    /* ═══ PAGE SHELL ═══ */
    #app {
      padding-top: 132px;
      min-height: 100vh
    }

    .page {
      animation: fadeUp .4s var(--ease2)
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* scroll reveal */
    .sr {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity .6s var(--ease2), transform .6s var(--ease2)
    }

    .sr.visible {
      opacity: 1;
      transform: translateY(0)
    }

    /* ═══ BUTTONS (unified gold hover) ═══ */
    .btn-p {
      background: var(--ink);
      color: white;
      padding: 14px 38px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all .3s var(--ease2);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center
    }

    .btn-p:hover {
      background: var(--gold);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(184, 150, 62, .25)
    }

    .btn-o {
      background: transparent;
      border: 1px solid var(--ink);
      color: var(--ink);
      padding: 13px 36px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all .3s var(--ease2);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center
    }

    .btn-o:hover {
      border-color: var(--gold);
      color: var(--gold);
      transform: translateY(-1px)
    }

    .btn-g {
      background: var(--gold);
      color: white;
      padding: 14px 38px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all .3s var(--ease2)
    }

    .btn-g:hover {
      background: var(--gold2);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(184, 150, 62, .3)
    }

    .btn-sm {
      padding: 8px 18px;
      font-size: .66rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all .2s var(--ease2)
    }

    .btn-sm.dark {
      background: var(--ink);
      color: white
    }

    .btn-sm.dark:hover {
      background: var(--gold)
    }

    .btn-sm.outline {
      border: 1px solid var(--border);
      color: var(--muted)
    }

    .btn-sm.outline:hover {
      border-color: var(--gold);
      color: var(--gold)
    }

    .btn-sm.danger {
      border: 1px solid var(--red);
      color: var(--red)
    }

    .btn-sm.danger:hover {
      background: var(--red);
      color: white
    }

    .btn-sm.success {
      border: 1px solid var(--green);
      color: var(--green)
    }

    .btn-sm.success:hover {
      background: var(--green);
      color: white
    }

    /* ═══ SECTION ═══ */
    .sec {
      padding: 100px 48px
    }

    .sec-alt {
      background: var(--paper)
    }

    .sec-dark {
      background: var(--ink);
      color: rgba(255, 255, 255, .85)
    }

    .sec-gold {
      background: linear-gradient(135deg, #c8a54a, #e0c36a)
    }

    .sec-hd {
      text-align: center;
      margin-bottom: 60px
    }

    .sec-tag {
      font-size: .62rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
      display: inline-block;
      margin-bottom: 12px
    }

    .sec-title {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 600;
      line-height: 1.2
    }

    .sec-sub {
      font-size: .85rem;
      color: var(--muted);
      max-width: 440px;
      margin: 14px auto 0;
      line-height: 1.7
    }

    /* ═══ HERO (editorial magazine) ═══ */
    .hero {
      min-height: calc(100vh - 132px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      right: 0;
      bottom: 0;
      background: var(--ink);
      z-index: 0
    }

    .hero-l {
      padding: 80px 64px 80px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1
    }

    .hero-tag {
      font-size: .62rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: slideUp .6s var(--ease2) .1s forwards
    }

    .hero-tag::before {
      content: '';
      width: 36px;
      height: 1px;
      background: var(--gold)
    }

    .hero-h {
      font-family: var(--serif);
      font-size: clamp(2.6rem, 5vw, 4.2rem);
      line-height: 1;
      font-weight: 600;
      margin-bottom: 24px;
      opacity: 0;
      animation: slideUp .6s var(--ease2) .2s forwards
    }

    .hero-h em {
      font-style: italic;
      color: var(--gold)
    }

    .hero-sub {
      font-size: .88rem;
      color: var(--muted);
      line-height: 1.85;
      max-width: 380px;
      margin-bottom: 40px;
      opacity: 0;
      animation: slideUp .6s var(--ease2) .3s forwards
    }

    .hero-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 72px;
      opacity: 0;
      animation: slideUp .6s var(--ease2) .4s forwards
    }

    .hero-stats {
      display: flex;
      gap: 0;
      opacity: 0;
      animation: slideUp .6s var(--ease2) .5s forwards
    }

    .stat {
      text-align: center;
      padding: 0 32px;
      border-right: 1px solid var(--border)
    }

    .stat:first-child {
      padding-left: 0
    }

    .stat:last-child {
      border: none;
      padding-right: 0
    }

    .stat .num {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 700
    }

    .stat .lbl {
      font-size: .62rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px
    }

    .hero-r {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      position: relative;
      z-index: 1
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      cursor: pointer
    }

    .hero-card:first-child {
      grid-row: span 2
    }

    .hero-card-bg {
      position: absolute;
      inset: 0;
      transition: transform .7s var(--ease2)
    }

    .hero-card:hover .hero-card-bg {
      transform: scale(1.06)
    }

    .hero-card-emo {
      position: relative;
      z-index: 1;
      font-size: clamp(3rem, 5vw, 5rem);
      opacity: .18;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      transition: opacity .4s
    }

    .hero-card:hover .hero-card-emo {
      opacity: .3
    }

    .hero-card-ov {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, .55) 0%, transparent 50%);
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 20px
    }

    .hero-card-lbl {
      color: white;
      font-size: .62rem;
      letter-spacing: 2.5px;
      text-transform: uppercase
    }

    .hero-card-arrow {
      color: var(--gold);
      opacity: 0;
      transform: translateX(-6px);
      transition: all .3s
    }

    .hero-card:hover .hero-card-arrow {
      opacity: 1;
      transform: translateX(0)
    }

    /* HOW IT WORKS */
    .steps-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 48px;
      position: relative
    }

    .steps-grid::before {
      content: '';
      position: absolute;
      top: 28px;
      left: 12%;
      right: 12%;
      height: 1px;
      background: var(--border)
    }

    .step-item {
      text-align: center;
      position: relative;
      z-index: 1
    }

    .step-num {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--paper);
      border: 2px solid var(--border);
      color: var(--gold);
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      transition: all .3s var(--ease2)
    }

    .step-item:hover .step-num {
      background: var(--gold);
      color: white;
      border-color: var(--gold);
      transform: scale(1.08)
    }

    .step-item h3 {
      font-family: var(--serif);
      font-size: 1.05rem;
      margin-bottom: 8px
    }

    .step-item p {
      font-size: .8rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 200px;
      margin: 0 auto
    }

    /* ═══ PRODUCT CARD (glassmorphism + quick actions) ═══ */
    .featured-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px
    }

    .pcard {
      background: var(--paper);
      overflow: hidden;
      cursor: pointer;
      transition: all .35s var(--ease2);
      position: relative;
      border: 1px solid transparent
    }

    .pcard:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--border)
    }

    .pcard-img {
      aspect-ratio: 3/4;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .pcard-emo {
      font-size: clamp(3.5rem, 5vw, 5.5rem);
      transition: transform .5s var(--ease2);
      position: relative;
      z-index: 1
    }

    .pcard:hover .pcard-emo {
      transform: scale(1.08) rotate(1deg)
    }

    .pcard-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--ink);
      color: white;
      font-size: .56rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      z-index: 3
    }

    /* Like button — always visible top-right */
    .pcard-like {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      z-index: 3;
      border: none;
      transition: all .2s;
      box-shadow: var(--shadow-sm)
    }

    .pcard-like:hover {
      transform: scale(1.15);
      background: white
    }

    .pcard-like.liked {
      background: var(--ink);
      color: white
    }

    /* Quick action overlay on hover */
    .pcard-actions {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 4;
      padding: 12px;
      display: flex;
      gap: 6px;
      background: linear-gradient(transparent, rgba(0, 0, 0, .6));
      opacity: 0;
      transform: translateY(6px);
      transition: all .3s var(--ease2)
    }

    .pcard:hover .pcard-actions {
      opacity: 1;
      transform: translateY(0)
    }

    .pcard-act {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all .2s;
      border: none
    }

    .pcard-act.cart {
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(6px);
      color: var(--ink)
    }

    .pcard-act.cart:hover {
      background: var(--gold);
      color: white
    }

    .pcard-act.buy {
      background: var(--ink);
      color: white
    }

    .pcard-act.buy:hover {
      background: var(--gold)
    }

    .pcard-body {
      padding: 14px 14px 16px
    }

    .pcard-brand {
      font-size: .6rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 5px
    }

    .pcard-name {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
      transition: color .2s
    }

    .pcard:hover .pcard-name {
      color: var(--gold)
    }

    .pcard-rating {
      font-size: .7rem;
      color: var(--muted);
      margin-bottom: 10px
    }

    .pcard-rating span {
      color: var(--gold)
    }

    .pcard-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between
    }

    .pcard-price .main {
      font-size: .95rem;
      font-weight: 700
    }

    .pcard-price .sub {
      font-size: .65rem;
      color: var(--muted)
    }

    .pcard-link {
      font-size: .62rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: gap .2s
    }

    .pcard:hover .pcard-link {
      gap: 8px
    }

    /* TESTIMONIALS */
    .testi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px
    }

    .testi {
      border: 1px solid rgba(255, 255, 255, .07);
      padding: 32px;
      position: relative;
      transition: all .3s var(--ease2)
    }

    .testi:hover {
      border-color: rgba(184, 150, 62, .2);
      background: rgba(255, 255, 255, .02);
      transform: translateY(-4px)
    }

    .testi::before {
      content: '\201C';
      font-family: var(--serif);
      font-size: 4rem;
      color: var(--gold);
      opacity: .15;
      position: absolute;
      top: 10px;
      left: 24px;
      line-height: 1
    }

    .testi-stars {
      color: var(--gold);
      font-size: .72rem;
      letter-spacing: 2px;
      margin-bottom: 8px
    }

    .testi-text {
      font-size: .84rem;
      line-height: 1.85;
      opacity: .72;
      margin: 16px 0 20px
    }

    .testi-author {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .testi-av {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem
    }

    .testi-name {
      font-weight: 600;
      font-size: .82rem
    }

    .testi-role {
      font-size: .68rem;
      opacity: .4;
      margin-top: 2px
    }

    /* NEWSLETTER */
    .nl {
      max-width: 520px;
      margin: 0 auto;
      text-align: center
    }

    .nl h2 {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 12px
    }

    .nl p {
      color: rgba(0, 0, 0, .45);
      margin-bottom: 32px;
      font-size: .85rem
    }

    .nl-form {
      display: flex;
      overflow: hidden;
      box-shadow: var(--shadow-md)
    }

    .nl-form input {
      flex: 1;
      border: none;
      padding: 15px 22px;
      font-size: .85rem;
      background: white
    }

    .nl-form button {
      background: var(--ink);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: background .2s
    }

    .nl-form button:hover {
      background: var(--gold)
    }

    /* ═══ CATALOG ═══ */
    .catalog-wrap {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 36px;
      padding: 32px 48px 80px
    }

    .sidebar {
      position: sticky;
      top: 152px;
      align-self: start
    }

    .sidebar h3 {
      font-family: var(--serif);
      font-size: 1.1rem;
      margin-bottom: 20px;
      font-weight: 600
    }

    .filter-group {
      margin-bottom: 24px
    }

    .filter-group h4 {
      font-size: .62rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 600
    }

    /* Category chips */
    .cat-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px
    }

    .cat-chip {
      padding: 7px 14px;
      font-size: .72rem;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .2s;
      background: var(--paper)
    }

    .cat-chip.active,
    .cat-chip:hover {
      background: var(--ink);
      color: white;
      border-color: var(--ink)
    }

    /* Size chips */
    .sz-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px
    }

    .sz-chip {
      width: 38px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .72rem;
      font-weight: 600;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .2s;
      background: var(--paper)
    }

    .sz-chip.active,
    .sz-chip:hover {
      background: var(--gold);
      color: white;
      border-color: var(--gold)
    }

    .price-range {
      width: 100%;
      accent-color: var(--gold);
      margin-top: 4px
    }

    .price-val {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 6px
    }

    .catalog-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px
    }

    .cat-search {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      padding: 8px 16px;
      background: var(--paper);
      transition: border-color .2s
    }

    .cat-search:focus-within {
      border-color: var(--gold)
    }

    .cat-search input {
      border: none;
      font-size: .82rem;
      width: 200px;
      background: transparent
    }

    .cat-count {
      font-size: .78rem;
      color: var(--muted)
    }

    .sort-sel {
      border: 1px solid var(--border);
      padding: 8px 14px;
      font-size: .78rem;
      background: var(--paper);
      color: var(--muted);
      cursor: pointer;
      transition: border-color .2s
    }

    .sort-sel:hover {
      border-color: var(--gold)
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px
    }

    .catalog-grid.single-col {
      grid-template-columns: 1fr
    }

    .pagination {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center
    }

    .pg-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--paper);
      font-size: .8rem;
      font-weight: 600;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .pg-btn:hover,
    .pg-btn.active {
      background: var(--gold);
      color: white;
      border-color: var(--gold)
    }

    .pg-btn:disabled {
      opacity: .3;
      pointer-events: none
    }

    .breadcrumb {
      padding: 18px 48px 0;
      font-size: .75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px
    }

    .breadcrumb span {
      cursor: pointer;
      transition: color .15s
    }

    .breadcrumb span:hover {
      color: var(--gold)
    }

    /* ═══ PRODUCT DETAIL ═══ */
    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      padding: 32px 48px 80px;
      max-width: 1200px;
      margin: 0 auto
    }

    .pd-img {
      position: sticky;
      top: 152px;
      align-self: start;
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10rem
    }

    .pd-badge {
      display: inline-block;
      background: var(--ink);
      color: white;
      font-size: .56rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 12px;
      margin-bottom: 14px
    }

    .pd-brand {
      font-size: .62rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px
    }

    .pd-title {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.2
    }

    .pd-rating {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px
    }

    .pd-stars {
      color: var(--gold);
      font-size: .85rem
    }

    .pd-rv {
      font-size: .75rem;
      color: var(--muted)
    }

    .pd-desc {
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: 28px
    }

    .pd-sec-title {
      font-size: .62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--muted)
    }

    .rental-opts {
      display: flex;
      gap: 8px;
      margin-bottom: 24px
    }

    .rent-opt {
      border: 1px solid var(--border);
      padding: 14px 20px;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
      min-width: 90px;
      background: var(--paper)
    }

    .rent-opt.sel,
    .rent-opt:hover {
      border-color: var(--gold);
      background: var(--gold-soft)
    }

    .rent-opt .days {
      font-weight: 700;
      font-size: .88rem
    }

    .rent-opt .rprice {
      font-size: .68rem;
      color: var(--gold);
      margin-top: 4px
    }

    .size-opts {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap
    }

    .sz-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      font-size: .8rem;
      font-weight: 600;
      background: var(--paper);
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .sz-btn.sel,
    .sz-btn:hover {
      border-color: var(--gold);
      background: var(--gold);
      color: white
    }

    .pd-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px
    }

    .pd-total-lbl {
      font-size: .66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted)
    }

    .pd-total-price {
      font-family: var(--serif);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold)
    }

    .pd-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 10px
    }

    .pd-btns button {
      flex: 1;
      padding: 16px;
      font-size: .72rem;
      justify-content: center
    }

    .pd-add-btn {
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      font-size: .72rem;
      justify-content: center
    }

    .pd-info-list {
      font-size: .78rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 18px;
      background: var(--warm);
      padding: 18px 20px
    }

    .pd-info-list span {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .related-sec {
      padding: 0 48px 80px
    }

    .related-sec h2 {
      font-family: var(--serif);
      font-size: 1.6rem;
      margin-bottom: 24px;
      font-weight: 600
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px
    }

    /* ═══ CART SIDEBAR ═══ */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .4);
      backdrop-filter: blur(3px);
      z-index: 299;
      display: none
    }

    .cart-overlay.open {
      display: block
    }

    .cart-side {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 400px;
      background: var(--paper);
      z-index: 300;
      transform: translateX(100%);
      transition: transform .4s var(--ease2);
      display: flex;
      flex-direction: column;
      box-shadow: -16px 0 48px rgba(0, 0, 0, .1)
    }

    .cart-side.open {
      transform: translateX(0)
    }

    .cart-side-hd {
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .cart-side-hd h2 {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 600
    }

    .cart-close {
      font-size: 1.2rem;
      color: var(--muted);
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s
    }

    .cart-close:hover {
      color: var(--gold)
    }

    .cart-items-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px
    }

    .ci {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border)
    }

    .ci-img {
      width: 60px;
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0
    }

    .ci-info {
      flex: 1
    }

    .ci-name {
      font-family: var(--serif);
      font-size: .9rem;
      margin-bottom: 3px;
      font-weight: 600
    }

    .ci-meta {
      font-size: .7rem;
      color: var(--muted);
      margin-bottom: 5px
    }

    .ci-price {
      font-weight: 700;
      font-size: .85rem;
      color: var(--gold);
      margin-bottom: 4px
    }

    .ci-rm {
      color: var(--muted);
      font-size: .7rem;
      transition: color .2s;
      padding: 0
    }

    .ci-rm:hover {
      color: var(--red)
    }

    .cart-foot {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      background: var(--warm)
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 14px
    }

    .cart-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted)
    }

    .cart-empty .ico {
      font-size: 3rem;
      display: block;
      margin-bottom: 14px;
      opacity: .3
    }

    /* ═══ CHECKOUT ═══ */
    .checkout-wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 36px 36px 80px
    }

    .checkout-steps {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 48px
    }

    .cs {
      display: flex;
      align-items: center
    }

    .cs-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .72rem;
      font-weight: 700;
      background: var(--paper);
      transition: all .3s
    }

    .cs-dot.done {
      background: var(--green);
      border-color: var(--green);
      color: white
    }

    .cs-dot.active {
      background: var(--gold);
      border-color: var(--gold);
      color: white
    }

    .cs-lbl {
      font-size: .66rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-left: 8px;
      color: var(--muted)
    }

    .cs-lbl.active {
      color: var(--ink);
      font-weight: 600
    }

    .cs-line {
      width: 56px;
      height: 1px;
      background: var(--border);
      margin: 0 12px
    }

    .cs-line.done {
      background: var(--green)
    }

    .checkout-card {
      background: var(--paper);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 16px
    }

    .checkout-card h3 {
      font-family: var(--serif);
      font-size: 1.3rem;
      margin-bottom: 22px;
      font-weight: 600
    }

    .co-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border)
    }

    .co-item:last-child {
      border-bottom: none
    }

    .co-img {
      width: 52px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0
    }

    .co-name {
      font-family: var(--serif);
      font-size: .9rem;
      font-weight: 600
    }

    .co-meta {
      font-size: .7rem;
      color: var(--muted);
      margin-top: 2px
    }

    .co-price {
      font-weight: 700;
      font-size: .88rem;
      margin-left: auto
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .form-group.full {
      grid-column: span 2
    }

    .form-group label {
      font-size: .66rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted)
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      border: 1px solid var(--border);
      padding: 11px 14px;
      font-size: .85rem;
      background: var(--paper);
      transition: border-color .2s;
      color: var(--ink)
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold-glow)
    }

    .form-group textarea {
      resize: vertical;
      min-height: 76px
    }

    .pay-opts {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px
    }

    .pay-opt {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .2s
    }

    .pay-opt.sel {
      border-color: var(--gold);
      background: var(--gold-soft)
    }

    .pay-opt:hover {
      border-color: var(--gold)
    }

    .pay-opt input[type=radio] {
      accent-color: var(--gold)
    }

    .pay-opt-icon {
      font-size: 1.3rem
    }

    .pay-opt-txt h4 {
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 1px
    }

    .pay-opt-txt p {
      font-size: .72rem;
      color: var(--muted)
    }

    .order-summary {
      background: var(--warm);
      padding: 22px
    }

    .os-row {
      display: flex;
      justify-content: space-between;
      font-size: .82rem;
      margin-bottom: 8px
    }

    .os-row.total {
      font-weight: 700;
      font-size: .95rem;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: 10px;
      color: var(--gold)
    }

    .checkout-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px
    }

    .success-wrap {
      text-align: center;
      padding: 80px 36px;
      max-width: 560px;
      margin: 0 auto
    }

    .success-ico {
      font-size: 4.5rem;
      margin-bottom: 20px
    }

    .success-wrap h1 {
      font-family: var(--serif);
      font-size: 2.4rem;
      margin-bottom: 14px;
      font-weight: 600
    }

    .success-wrap p {
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.7;
      margin-bottom: 10px
    }

    .order-num {
      font-family: var(--serif);
      font-size: 1.3rem;
      color: var(--gold);
      font-weight: 700;
      margin: 22px 0
    }

    /* ═══ AUTH ═══ */
    .auth-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 132px);
      padding: 40px 20px
    }

    .auth-card {
      background: var(--paper);
      border: 1px solid var(--border);
      padding: 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md)
    }

    .auth-card h1 {
      font-family: var(--serif);
      font-size: 1.8rem;
      margin-bottom: 4px;
      font-weight: 600
    }

    .auth-card .sub {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 28px
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    .auth-footer {
      text-align: center;
      margin-top: 18px;
      font-size: .8rem;
      color: var(--muted)
    }

    .auth-footer a {
      color: var(--gold);
      font-weight: 600;
      cursor: pointer
    }

    .auth-footer a:hover {
      text-decoration: underline
    }

    .auth-divider {
      text-align: center;
      font-size: .72rem;
      color: var(--muted);
      margin: 8px 0;
      position: relative
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 24px);
      height: 1px;
      background: var(--border)
    }

    .auth-divider::before {
      left: 0
    }

    .auth-divider::after {
      right: 0
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
      padding: 10px 14px;
      font-size: .8rem
    }

    /* ═══ PROFILE ═══ */
    .profile-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 36px 80px
    }

    .profile-hd {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 40px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border)
    }

    .profile-av {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--gold);
      font-family: var(--serif);
      font-weight: 700;
      flex-shrink: 0
    }

    .profile-info h1 {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 2px
    }

    .profile-info .email {
      font-size: .78rem;
      color: var(--gold);
      margin-bottom: 2px
    }

    .profile-info .meta {
      font-size: .78rem;
      color: var(--muted)
    }

    .profile-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border)
    }

    .ptab {
      padding: 12px 24px;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all .2s;
      margin-bottom: -1px
    }

    .ptab.active {
      color: var(--ink);
      border-bottom-color: var(--gold)
    }

    .ptab:hover {
      color: var(--gold)
    }

    .profile-card {
      background: var(--paper);
      border: 1px solid var(--border);
      padding: 28px;
      margin-bottom: 16px
    }

    .profile-card h3 {
      font-family: var(--serif);
      font-size: 1.1rem;
      margin-bottom: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px
    }

    .p-stat {
      text-align: center;
      background: var(--warm);
      padding: 18px
    }

    .p-stat .val {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold)
    }

    .p-stat .lbl {
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 3px
    }

    .profile-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px
    }

    .p-order {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border)
    }

    .p-order:last-child {
      border-bottom: none
    }

    .p-order-id {
      font-family: var(--serif);
      color: var(--gold);
      font-weight: 700;
      font-size: .88rem;
      min-width: 80px
    }

    .p-order-items {
      font-size: .8rem;
      color: var(--muted);
      flex: 1
    }

    .p-order-total {
      font-weight: 700;
      font-size: .85rem
    }

    .p-order-status {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      background: rgba(45, 138, 86, .08);
      color: var(--green)
    }

    .wish-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px
    }

    /* ═══ ADMIN ═══ */
    body.admin-mode {
      background: var(--admin-bg)
    }

    body.admin-mode #app {
      padding-top: 0
    }

    .admin-layout {
      display: flex;
      min-height: 100vh
    }

    .admin-side {
      width: 210px;
      background: var(--admin-side);
      flex-shrink: 0;
      padding: 22px 0;
      border-right: 1px solid rgba(255, 255, 255, .05)
    }

    .admin-side-logo {
      padding: 0 18px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      margin-bottom: 14px
    }

    .admin-side-logo .nav-logo {
      font-size: 1.2rem;
      color: white
    }

    .admin-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      font-size: .8rem;
      color: rgba(255, 255, 255, .45);
      transition: all .2s;
      cursor: pointer
    }

    .admin-nav a:hover,
    .admin-nav a.active {
      background: rgba(184, 150, 62, .08);
      color: var(--gold)
    }

    .admin-nav a .ico {
      font-size: .95rem;
      width: 18px;
      text-align: center
    }

    .admin-content {
      flex: 1;
      padding: 28px;
      overflow-y: auto;
      color: rgba(255, 255, 255, .8)
    }

    .admin-content h1 {
      font-family: var(--serif);
      font-size: 1.6rem;
      color: white;
      margin-bottom: 4px;
      font-weight: 600
    }

    .admin-content .sub {
      font-size: .78rem;
      color: rgba(255, 255, 255, .3);
      margin-bottom: 28px
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 32px
    }

    .admin-stat {
      background: var(--admin-panel);
      border: 1px solid rgba(255, 255, 255, .05);
      padding: 22px;
      transition: border-color .2s
    }

    .admin-stat:hover {
      border-color: rgba(184, 150, 62, .15)
    }

    .admin-stat .label {
      font-size: .6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .25);
      margin-bottom: 10px
    }

    .admin-stat .value {
      font-family: var(--serif);
      font-size: 1.8rem;
      color: white;
      font-weight: 700
    }

    .admin-stat .delta {
      font-size: .7rem;
      color: var(--green);
      margin-top: 4px
    }

    /* Chart placeholder */
    .admin-chart {
      background: var(--admin-panel);
      border: 1px solid rgba(255, 255, 255, .05);
      padding: 22px;
      margin-bottom: 24px
    }

    .admin-chart h3 {
      font-size: .9rem;
      color: white;
      margin-bottom: 14px;
      font-weight: 600
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 120px;
      padding-top: 8px
    }

    .chart-bar {
      flex: 1;
      background: linear-gradient(to top, var(--gold), var(--gold2));
      border-radius: 2px 2px 0 0;
      transition: all .3s;
      position: relative;
      min-width: 0
    }

    .chart-bar:hover {
      opacity: .8
    }

    .chart-bar-lbl {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: .55rem;
      color: rgba(255, 255, 255, .3);
      white-space: nowrap
    }

    .admin-table-wrap {
      background: var(--admin-panel);
      border: 1px solid rgba(255, 255, 255, .05);
      overflow: hidden
    }

    .admin-table-hd {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .admin-table-hd h3 {
      font-size: .95rem;
      font-weight: 600;
      color: white
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse
    }

    .admin-table th {
      font-size: .6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .2);
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, .04);
      font-weight: 500
    }

    .admin-table td {
      padding: 12px 14px;
      font-size: .8rem;
      border-bottom: 1px solid rgba(255, 255, 255, .03);
      color: rgba(255, 255, 255, .65)
    }

    .admin-table tr:last-child td {
      border-bottom: none
    }

    .admin-table tr:hover td {
      background: rgba(255, 255, 255, .015)
    }

    .status-badge {
      display: inline-flex;
      padding: 3px 10px;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase
    }

    .status-badge.active {
      background: rgba(45, 138, 86, .1);
      color: var(--green)
    }

    .status-badge.pending {
      background: var(--gold-soft);
      color: var(--gold)
    }

    .status-badge.rejected {
      background: rgba(192, 57, 43, .1);
      color: var(--red)
    }

    .status-badge.paid {
      background: rgba(45, 138, 86, .1);
      color: var(--green)
    }

    .admin-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .admin-form-card {
      background: var(--admin-panel);
      border: 1px solid rgba(255, 255, 255, .05);
      padding: 24px
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px
    }

    .admin-form-group {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .admin-form-group.full {
      grid-column: span 2
    }

    .admin-form-group label {
      font-size: .6rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .3);
      font-weight: 500
    }

    .admin-form-group input,
    .admin-form-group select,
    .admin-form-group textarea {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .07);
      padding: 10px 14px;
      font-size: .82rem;
      color: white;
      transition: border-color .2s
    }

    .admin-form-group input:focus,
    .admin-form-group select:focus,
    .admin-form-group textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(184, 150, 62, .12)
    }

    .admin-form-group select option {
      background: #1a1814;
      color: white
    }

    .admin-form-group textarea {
      resize: vertical;
      min-height: 76px
    }

    .admin-search {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .07);
      padding: 7px 14px;
      font-size: .78rem;
      color: white;
      width: 180px;
      transition: border-color .2s
    }

    .admin-search:focus {
      border-color: var(--gold)
    }

    .admin-search::placeholder {
      color: rgba(255, 255, 255, .2)
    }

    .admin-filter {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .07);
      padding: 7px 12px;
      font-size: .75rem;
      color: rgba(255, 255, 255, .6)
    }

    .admin-filter option {
      background: #1a1814
    }

    .admin-login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px
    }

    .admin-login-card {
      background: var(--admin-panel);
      border: 1px solid rgba(255, 255, 255, .06);
      padding: 44px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-xl)
    }

    .admin-login-card h1 {
      font-family: var(--serif);
      font-size: 1.8rem;
      color: white;
      margin-bottom: 4px;
      font-weight: 600
    }

    .admin-login-card .sub {
      font-size: .78rem;
      color: rgba(255, 255, 255, .25);
      margin-bottom: 28px
    }

    .admin-login-card .form-group label {
      color: rgba(255, 255, 255, .3)
    }

    .admin-login-card .form-group input {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .07);
      color: white
    }

    .admin-login-card .form-group input:focus {
      border-color: var(--gold)
    }

    /* Quick modal */
    .modal-ov {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      backdrop-filter: blur(4px);
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s
    }

    .modal-ov.open {
      opacity: 1;
      pointer-events: all
    }

    .modal-card {
      background: var(--paper);
      padding: 32px;
      max-width: 400px;
      width: 90%;
      box-shadow: var(--shadow-xl);
      transform: scale(.92);
      transition: transform .25s var(--ease2);
      position: relative
    }

    .modal-ov.open .modal-card {
      transform: scale(1)
    }

    .modal-x {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 1.1rem;
      color: var(--muted);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s
    }

    .modal-x:hover {
      color: var(--gold)
    }

    /* FOOTER (Revolve-style) */
    footer {
      background: var(--paper);
      border-top: 1px solid var(--border)
    }

    .footer-top {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border)
    }

    .footer-top-item {
      padding: 36px 48px;
      text-align: center;
      border-right: 1px solid var(--border)
    }

    .footer-top-item:last-child {
      border-right: none
    }

    .footer-top-item h4 {
      font-size: .66rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px
    }

    .footer-top-item p {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.6
    }

    .footer-main {
      padding: 52px 48px 32px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 48px
    }

    .footer-brand .nav-logo {
      margin-bottom: 14px
    }

    .footer-desc {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.8;
      max-width: 240px;
      margin-bottom: 18px
    }

    .footer-socials {
      display: flex;
      gap: 8px
    }

    .soc-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .82rem;
      cursor: pointer;
      transition: all .2s
    }

    .soc-btn:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: white
    }

    .footer-col h4 {
      font-size: .58rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 16px
    }

    .footer-col ul {
      list-style: none
    }

    .footer-col li {
      margin-bottom: 8px
    }

    .footer-col a {
      font-size: .78rem;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s
    }

    .footer-col a:hover {
      color: var(--gold)
    }

    .footer-bottom {
      border-top: 1px solid var(--border);
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .footer-bottom p {
      font-size: .68rem;
      color: var(--muted2)
    }

    .footer-bottom-links {
      display: flex;
      gap: 20px
    }

    .footer-bottom-links a {
      font-size: .62rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s
    }

    .footer-bottom-links a:hover {
      color: var(--gold)
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: white;
      padding: 13px 24px;
      font-size: .8rem;
      font-weight: 500;
      z-index: 500;
      transition: transform .35s var(--ease2);
      white-space: nowrap;
      pointer-events: none;
      box-shadow: var(--shadow-lg)
    }

    .toast.show {
      transform: translateX(-50%) translateY(0)
    }

    .toast.green {
      background: var(--green)
    }

    .toast.red {
      background: var(--red)
    }

    /* ═══ RESPONSIVE ═══ */
    @media(max-width:1024px) {
      .sec {
        padding: 72px 32px
      }

      .nav-main,
      .nav-top,
      .nav-cats {
        padding-left: 24px;
        padding-right: 24px
      }

      .hero {
        grid-template-columns: 1fr
      }

      .hero::before {
        display: none
      }

      .hero-l {
        padding: 48px 32px
      }

      .hero-r {
        height: 50vw
      }

      .catalog-wrap {
        padding: 24px 32px 60px;
        grid-template-columns: 180px 1fr;
        gap: 24px
      }

      .product-detail {
        padding: 24px 32px 60px;
        gap: 32px
      }

      .featured-grid,
      .related-grid {
        grid-template-columns: repeat(2, 1fr)
      }

      .steps-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 28px
      }

      .steps-grid::before {
        display: none
      }

      .testi-grid {
        grid-template-columns: 1fr
      }

      .footer-main {
        grid-template-columns: 1fr 1fr;
        gap: 28px
      }

      .footer-top {
        grid-template-columns: 1fr
      }

      .footer-top-item {
        border-right: none;
        border-bottom: 1px solid var(--border)
      }

      .admin-stats {
        grid-template-columns: repeat(2, 1fr)
      }

      .profile-stats {
        grid-template-columns: repeat(2, 1fr)
      }

      .wish-grid {
        grid-template-columns: repeat(2, 1fr)
      }
    }

    @media(max-width:768px) {
      #app {
        padding-top: 90px
      }

      .nav-top {
        display: none
      }

      return `<h1>Бүтээгдэхүүн</h1><p class="sub">Бүх бараа</p><div class="admin-table-wrap"><div class="admin-table-hd"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><input class="admin-search" placeholder="🔍 Хайх..." value="${DB.adminSearch}" oninput="DB.adminSearch=this.value;renderAdmin('products')"><select class="admin-filter" onchange="DB.adminFilter=this.value;renderAdmin('products')"><option value="all" ${DB.adminFilter === 'all' ? 'selected' : ''}>Бүгд</option><option value="active" ${DB.adminFilter === 'active' ? 'selected' : ''}>Идэвхтэй</option><option value="pending" ${DB.adminFilter === 'pending' ? 'selected' : ''}>Хүлээгдэж</option><option value="rejected" ${DB.adminFilter === 'rejected' ? 'selected' : ''}>Татгалзсан</option></select></div><button class="btn-sm dark" onclick="navigate('admin/add')">+ Нэмэх</button></div>
  <table class="admin-table"><thead><tr><th>Бараа</th><th>Ангилал</th><th>Размер</th><th>Үнэ</th><th>★</th><th>Статус</th><th>Үйлдэл</th></tr></thead><tbody>
    ${f.map(p => `<tr><td><div style="display:flex;align-items:center;gap:8px"><span style="font-size:1.2rem">${p.emoji}</span><div><div style="font-weight:600;color:white">${p.name}</div><div style="font-size:.68rem;opacity:.3">${p.brand}</div></div></div></td><td>${CATS.find(c => c.v === p.category)?.l}</td><td style="font-size:.72rem">${p.sizes.join(', ')}</td><td>${fmt(p.prices[1])}</td><td><span style="color:var(--gold)">★</span> ${p.rating}</td><td><span class="status-badge ${p.status}">${p.status === 'active' ? 'Идэвхтэй' : p.status === 'pending' ? 'Хүлээгдэж' : 'Татгалзсан'}</span></td><td><div class="admin-actions"><button class="btn-sm outline" style="border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.4)" onclick="navigate('admin/edit/${p.id}')">✏️</button>${p.status === 'pending' ? `<button class="btn-sm success" onclick="approveP(${p.id})">✓</button><button class="btn-sm danger" onclick="rejectP(${p.id})">✕</button>` : ''}<button class="btn-sm danger" onclick="deleteP(${p.id})">🗑</button></div></td></tr>`).join('')}
  </tbody></table></div>`}
    function adminAdd() { return `<h1>Нэмэх</h1><p class="sub">Шинэ бараа</p><div class="admin-form-card"><div class="admin-form-grid"><div class="admin-form-group"><label>Брэнд *</label><input id="af_brand"></div><div class="admin-form-group"><label>Нэр *</label><input id="af_name"></div><div class="admin-form-group full"><label>Тайлбар *</label><textarea id="af_desc"></textarea></div><div class="admin-form-group"><label>Ангилал *</label><select id="af_cat"><option value="">—</option>${CATS.filter(c => c.v !== 'all').map(c => `<option value="${c.v}">${c.l}</option>`).join('')}</select></div><div class="admin-form-group"><label>Emoji</label><input id="af_emoji" placeholder="👗" maxlength="4"></div><div class="admin-form-group"><label>Үнэ 1 өдөр *</label><input type="number" id="af_p1"></div><div class="admin-form-group"><label>3 өдөр</label><input type="number" id="af_p3"></div><div class="admin-form-group"><label>7 өдөр</label><input type="number" id="af_p7"></div><div class="admin-form-group"><label>Нөөц</label><input type="number" id="af_stock" value="1"></div><div class="admin-form-group"><label>Шошго</label><input id="af_badge"></div><div class="admin-form-group full"><label>Размер</label><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">${SIZES.map(s => `<label style="display:flex;align-items:center;gap:5px;cursor:pointer;color:rgba(255,255,255,.5);font-size:.8rem"><input type="checkbox" id="sz_${s}" style="accent-color:var(--gold)"> ${s}</label>`).join('')}</div></div></div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn-g" onclick="saveNew()">Хадгалах</button><button class="btn-sm outline" style="border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.3)" onclick="navigate('admin/products')">Болих</button></div></div>` }
    function saveNew() { const b = $('af_brand').value, n = $('af_name').value, d = $('af_desc').value, c = $('af_cat').value, e = $('af_emoji').value || '👗', p1 = +$('af_p1').value, p3 = +$('af_p3').value || p1 * 2.2, p7 = +$('af_p7').value || p1 * 4, st = +$('af_stock').value || 1, bg = $('af_badge').value, sz = SIZES.filter(s => $('sz_' + s)?.checked); if (!b || !n || !d || !c || !p1) { showToast('Бөглөнө үү', 'red'); return } if (!sz.length) { showToast('Размер сонгоно уу', 'red'); return } const bgs = { dress: 'linear-gradient(135deg,#3d1515,#6b2020)', business: 'linear-gradient(135deg,#0d1b2a,#1b2838)', casual: 'linear-gradient(135deg,#1a3a1a,#2a5a2a)', traditional: 'linear-gradient(135deg,#5c0a00,#a01500)' }; DB.products.push({ id: Math.max(...DB.products.map(p => p.id)) + 1, brand: b, name: n, desc: d, category: c, emoji: e, bg: bgs[c] || bgs.dress, sizes: sz, prices: { 1: p1, 3: Math.round(p3), 7: Math.round(p7) }, badge: bg || undefined, rating: 0, reviews: 0, stock: st, status: 'active', dateAdded: new Date().toISOString().split('T')[0] }); showToast(`Нэмэгдлээ ✓`, 'green'); navigate('admin/products') }
    function adminEdit(id) { const p = DB.products.find(x => x.id == id); if (!p) return '<p style="color:red">Олдсонгүй</p>'; return `<h1>Засах</h1><p class="sub">${p.name}</p><div class="admin-form-card"><div class="admin-form-grid"><div class="admin-form-group"><label>Брэнд</label><input id="ef_brand" value="${p.brand}"></div><div class="admin-form-group"><label>Нэр</label><input id="ef_name" value="${p.name}"></div><div class="admin-form-group full"><label>Тайлбар</label><textarea id="ef_desc">${p.desc}</textarea></div><div class="admin-form-group"><label>Ангилал</label><select id="ef_cat">${CATS.filter(c => c.v !== 'all').map(c => `<option value="${c.v}" ${p.category === c.v ? 'selected' : ''}>${c.l}</option>`).join('')}</select></div><div class="admin-form-group"><label>Emoji</label><input id="ef_emoji" value="${p.emoji}" maxlength="4"></div><div class="admin-form-group"><label>1 өдөр</label><input type="number" id="ef_p1" value="${p.prices[1]}"></div><div class="admin-form-group"><label>3 өдөр</label><input type="number" id="ef_p3" value="${p.prices[3]}"></div><div class="admin-form-group"><label>7 өдөр</label><input type="number" id="ef_p7" value="${p.prices[7]}"></div><div class="admin-form-group"><label>Нөөц</label><input type="number" id="ef_stock" value="${p.stock}"></div><div class="admin-form-group"><label>Статус</label><select id="ef_status"><option value="active" ${p.status === 'active' ? 'selected' : ''}>Идэвхтэй</option><option value="pending" ${p.status === 'pending' ? 'selected' : ''}>Хүлээгдэж</option><option value="rejected" ${p.status === 'rejected' ? 'selected' : ''}>Татгалзсан</option></select></div><div class="admin-form-group"><label>Шошго</label><input id="ef_badge" value="${p.badge || ''}"></div><div class="admin-form-group full"><label>Размер</label><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">${SIZES.map(s => `<label style="display:flex;align-items:center;gap:5px;cursor:pointer;color:rgba(255,255,255,.5);font-size:.8rem"><input type="checkbox" id="esz_${s}" ${p.sizes.includes(s) ? 'checked' : ''} style="accent-color:var(--gold)"> ${s}</label>`).join('')}</div></div></div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn-g" onclick="saveEdit(${p.id})">Хадгалах</button><button class="btn-sm outline" style="border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.3)" onclick="navigate('admin/products')">Болих</button></div></div>` }
    function saveEdit(id) { const p = DB.products.find(x => x.id == id); p.brand = $('ef_brand').value; p.name = $('ef_name').value; p.desc = $('ef_desc').value; p.category = $('ef_cat').value; p.emoji = $('ef_emoji').value || p.emoji; p.prices[1] = +$('ef_p1').value; p.prices[3] = +$('ef_p3').value; p.prices[7] = +$('ef_p7').value; p.stock = +$('ef_stock').value; p.status = $('ef_status').value; p.badge = $('ef_badge').value || undefined; p.sizes = SIZES.filter(s => $('esz_' + s)?.checked); showToast('Хадгалагдлаа ✓', 'green'); navigate('admin/products') }
    function approveP(id) { const p = DB.products.find(x => x.id == id); p.status = 'active'; showToast(`"${p.name}" ✓`, 'green'); renderAdmin(location.hash.includes('dashboard') ? 'dashboard' : 'products') }
    function rejectP(id) { const p = DB.products.find(x => x.id == id); p.status = 'rejected'; showToast(`Татгалзагдлаа`, 'red'); renderAdmin(location.hash.includes('dashboard') ? 'dashboard' : 'products') }
    function deleteP(id) { if (!confirm('Устгах?')) return; DB.products = DB.products.filter(x => x.id != id); showToast('Устгагдлаа'); renderAdmin('products') }
    function adminOrds() { return `<h1>Захиалга</h1><p class="sub">Нийт ${DB.orders.length}</p><div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Дугаар</th><th>Хэрэглэгч</th><th>Бараа</th><th>Нийт</th><th>Огноо</th><th>Статус</th></tr></thead><tbody>${DB.orders.length ? DB.orders.map(o => `<tr><td style="font-family:var(--serif);color:var(--gold);font-weight:700">${o.id}</td><td style="font-weight:600;color:white">${o.user}</td><td style="font-size:.75rem">${o.items.map(i => i.name).join(', ')}</td><td style="font-weight:600">${fmt(o.total)}</td><td>${o.date}</td><td><span class="status-badge active">${o.status}</span></td></tr>`).join('') : '<tr><td colspan="6" style="text-align:center;padding:48px;opacity:.25">Байхгүй</td></tr>'}</tbody></table></div>` }
    function adminUsrs() { return `<h1>Хэрэглэгч</h1><p class="sub">Нийт ${DB.users.length}</p><div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Нэр</th><th>И-мэйл</th><th>Утас</th><th>Захиалга</th><th>Статус</th></tr></thead><tbody>${DB.users.map(u => `<tr><td style="font-weight:600;color:white">${u.name}</td><td>${u.email}</td><td>${u.phone}</td><td>${u.orders}</td><td><span class="status-badge active">Идэвхтэй</span></td></tr>`).join('')}</tbody></table></div>` }

    /* ═══ FOOTER (Revolve-style) ═══ */

    <div class="footer-top-item"><h4>Чанарын баталгаа</h4><p>Бүх хувцас угааж цэвэрлэн, хяналт шалгалтын дараа хүргэнэ</p></div>
